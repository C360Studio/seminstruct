# CI override - builds seminstruct from source for integration testing.
# Mirrors the default :latest image (Qwen3-0.6B Q4_K_M, --reasoning off)
# so CI exercises the same shape ops will pull.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml build

services:
  seminstruct:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODEL_REPO: unsloth/Qwen3-0.6B-GGUF
        MODEL_FILE: Qwen3-0.6B-Q4_K_M.gguf
        MODEL_ALIAS: qwen3-0.6b
        MODEL_REASONING: "off"
    image: seminstruct:ci
