# CI override - builds semserve (llama-server + GGUF) from source for testing.
# Uses the same default model (Qwen3-0.6B Q4_K_M) as the published :latest
# image, so the CI integration test exercises the same shape ops will pull.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml build

services:
  semserve:
    build:
      context: .
      dockerfile: Dockerfile.semserve
      args:
        MODEL_REPO: unsloth/Qwen3-0.6B-GGUF
        MODEL_FILE: Qwen3-0.6B-Q4_K_M.gguf
        SEMSERVE_ALIAS: qwen3-0.6b
    image: semserve:ci
