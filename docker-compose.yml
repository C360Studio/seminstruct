# SemInstruct - local development
#
# Pulls the pre-built image from GHCR and runs llama-server with a baked-in
# GGUF on port 8083. The OpenAI-compatible API is at /v1/chat/completions.
#
# Default image is :latest (Qwen3-0.6B, hot tier). For other tiers swap to
# :qwen3-1.7b or :qwen3-8b. See README's "Image Variants" section.

services:
  seminstruct:
    image: ghcr.io/c360studio/seminstruct:latest
    container_name: seminstruct
    ports:
      - "8083:8083"
    environment:
      # Runtime overrides — the image bakes sensible defaults per variant,
      # but every knob below can be tuned per deployment without rebuilding.
      # See README's Configuration section for the full set.
      - MODEL_ALIAS=qwen3-0.6b
      - MODEL_REASONING=off
      # MODEL_CONTEXT: total context, divided across MODEL_PARALLEL slots.
      # Default 16384 / 4 = 4096 tokens per slot. Crank up for bigger
      # graph-summary prompts (memory cost scales linearly).
      - MODEL_CONTEXT=16384
      - MODEL_PARALLEL=4
      # MODEL_THREADS: empty = auto-detect. Set explicitly on shared hosts
      #   to prevent CPU oversubscription.
      # - MODEL_THREADS=
      # MODEL_API_KEY: empty = no auth. Set to require Bearer token.
      # - MODEL_API_KEY=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4.0'
        reservations:
          memory: 1G
          cpus: '1.0'
