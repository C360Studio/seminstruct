# SemInstruct - local development
#
# Pulls the pre-built image from GHCR and runs llama-server with a baked-in
# GGUF on port 8083. The OpenAI-compatible API is at /v1/chat/completions.
#
# Default image is :latest (Qwen3-0.6B, hot tier). For other tiers swap to
# :qwen3-1.7b or :qwen3-8b. See README's "Image Variants" section.

services:
  seminstruct:
    image: ghcr.io/c360studio/seminstruct:latest
    container_name: seminstruct
    ports:
      - "8083:8083"
    environment:
      # Override at runtime without rebuilding the image.
      # MODEL_ALIAS: stable model id surfaced in /v1/models.
      # MODEL_REASONING: Qwen3 thinking — on | off | auto. Defaults to off
      #   in :latest (hot tier); :qwen3-1.7b bakes auto.
      - MODEL_ALIAS=qwen3-0.6b
      - MODEL_REASONING=off
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4.0'
        reservations:
          memory: 1G
          cpus: '1.0'
