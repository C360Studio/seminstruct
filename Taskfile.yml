version: '3'

# seminstruct - dev workflow for the llama-server image factory.
# All tasks operate on the single seminstruct container (port 8083).

vars:
  IMAGE_NAME: seminstruct
  CONTAINER_NAME: seminstruct
  PORT: 8083

tasks:
  # ------------------------------------------------------------------------
  # Build
  # ------------------------------------------------------------------------
  build:
    desc: Build the seminstruct Docker image (default Qwen3-0.6B variant)
    cmds:
      - echo "Building seminstruct from source..."
      - docker compose -f docker-compose.yml -f docker-compose.ci.yml build
      - echo "Built {{.IMAGE_NAME}}:ci"

  build:no-cache:
    desc: Build without cache
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.ci.yml build --no-cache

  # ------------------------------------------------------------------------
  # Run
  # ------------------------------------------------------------------------
  up:
    desc: Start seminstruct (pulls :latest from GHCR by default)
    cmds:
      - docker compose up -d
      - echo "Service starting..."
      - 'echo "Health: curl http://localhost:{{.PORT}}/health"'
      - 'echo "Logs:   task logs"'

  down:
    desc: Stop the service
    cmds:
      - docker compose down

  # ------------------------------------------------------------------------
  # Integration tests (run before push!)
  # ------------------------------------------------------------------------
  integration:
    desc: Full local integration test (build + run + curl + cleanup)
    cmds:
      - echo "Building seminstruct from source..."
      - docker compose -f docker-compose.yml -f docker-compose.ci.yml build
      - docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
      - |
        echo "Waiting for model load..."
        for i in $(seq 1 90); do
          if curl -sf http://localhost:{{.PORT}}/health 2>/dev/null; then
            echo "seminstruct ready"
            break
          fi
          if [ $i -eq 90 ]; then
            echo "seminstruct timeout"
            docker compose logs seminstruct
            exit 1
          fi
          echo "  $i/90..."
          sleep 5
        done
      - echo "=== /v1/models ==="
      - curl -s http://localhost:{{.PORT}}/v1/models | jq '.data[] | {id, object}'
      - echo "=== /v1/chat/completions ==="
      - |
        curl -s http://localhost:{{.PORT}}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model":"qwen3-0.6b","messages":[{"role":"user","content":"Say hello"}],"max_tokens":20,"stream":false}' \
          | jq '.choices[0].message'
      - echo "=== Integration tests passed ==="
      - docker compose -f docker-compose.yml -f docker-compose.ci.yml down

  integration:quick:
    desc: Run integration assertions (service already running)
    cmds:
      - curl -s http://localhost:{{.PORT}}/health
      - echo ""
      - curl -s http://localhost:{{.PORT}}/v1/models | jq '.data[] | {id, object}'
      - |
        curl -s http://localhost:{{.PORT}}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model":"qwen3-0.6b","messages":[{"role":"user","content":"Say hello"}],"max_tokens":20,"stream":false}' \
          | jq '.choices[0].message'

  # ------------------------------------------------------------------------
  # Endpoint smoke tests
  # ------------------------------------------------------------------------
  test:health:
    desc: Hit /health
    cmds:
      - curl -fsS http://localhost:{{.PORT}}/health && echo

  test:models:
    desc: Hit /v1/models
    cmds:
      - curl -fsS http://localhost:{{.PORT}}/v1/models | jq

  test:chat:
    desc: Hit /v1/chat/completions with a short prompt
    cmds:
      - |
        model_id=$(curl -s http://localhost:{{.PORT}}/v1/models | jq -r '.data[0].id // "qwen3-0.6b"')
        curl -fsS http://localhost:{{.PORT}}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$model_id\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}],\"max_tokens\":50,\"stream\":false}" \
          | jq

  # ------------------------------------------------------------------------
  # Logs
  # ------------------------------------------------------------------------
  logs:
    desc: Tail seminstruct logs
    cmds:
      - docker compose logs -f seminstruct

  # ------------------------------------------------------------------------
  # Cleanup
  # ------------------------------------------------------------------------
  clean:
    desc: Stop and remove containers
    cmds:
      - docker compose down

  clean:image:
    desc: Remove built CI image
    deps: [clean]
    cmds:
      - docker rmi {{.IMAGE_NAME}}:ci 2>/dev/null || true

  # ------------------------------------------------------------------------
  # Help
  # ------------------------------------------------------------------------
  default:
    desc: List tasks
    silent: true
    cmds:
      - task --list

  help:
    desc: Usage guide
    silent: true
    cmds:
      - |
        echo "seminstruct - llama-server image factory for SemStreams instruct tier"
        echo ""
        echo "Quick start:"
        echo "  task up               # Pull :latest and start"
        echo "  task logs             # Tail logs"
        echo "  task test:chat        # Test chat completions"
        echo "  task down             # Stop"
        echo ""
        echo "Local build:"
        echo "  task build            # Build from Dockerfile (default Qwen3-0.6B)"
        echo "  task integration      # Full build + run + test + cleanup"
        echo ""
        echo "Smoke tests:"
        echo "  task test:health      # GET /health"
        echo "  task test:models      # GET /v1/models"
        echo "  task test:chat        # POST /v1/chat/completions"
        echo ""
        echo "See README.md for image variants, deployment patterns, and resource budgets."
