name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: c360studio/seminstruct
  RUST_VERSION: "1.95"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Allow time for llama-server build + model download

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build services (semserve from source + seminstruct)
        run: |
          echo "Building semserve (llama-server + GGUF) from source and seminstruct..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build

      - name: Start services
        run: |
          echo "Starting services with small model (Qwen3-0.6B Q4_K_M)..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for semserve model load
        run: |
          echo "Waiting for semserve (llama-server) to load model..."
          for i in {1..90}; do
            if curl -sf http://localhost:11435/health 2>/dev/null; then
              echo "Semserve is ready!"
              exit 0
            fi
            echo "Attempt $i/90: Model loading..."
            sleep 5
          done
          echo "Semserve failed to start"
          docker compose logs semserve
          exit 1

      - name: Wait for seminstruct
        run: |
          echo "Waiting for seminstruct to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8083/health 2>/dev/null; then
              echo "Seminstruct is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Seminstruct failed to start"
          docker compose logs seminstruct
          exit 1

      - name: Test health endpoint
        run: |
          response=$(curl -s http://localhost:8083/health)
          echo "Health response: $response"
          echo "$response" | grep -q '"backend_healthy":true' || (echo "Expected backend_healthy:true" && exit 1)

      - name: Test ready endpoint (waits for model load)
        run: |
          echo "Waiting for semserve model to load via /ready endpoint..."
          for i in {1..60}; do
            response=$(curl -s http://localhost:8083/ready)
            echo "Attempt $i/60: $response"
            if echo "$response" | grep -q '"ready":true'; then
              echo "Seminstruct is ready for inference!"
              exit 0
            fi
            sleep 5
          done
          echo "Seminstruct /ready never returned ready:true after 5 minutes"
          exit 1

      - name: Test metrics endpoint
        run: |
          metrics=$(curl -s http://localhost:8083/metrics)
          echo "Checking metrics..."
          echo "$metrics" | grep -q 'seminstruct_requests_total' || exit 1
          echo "$metrics" | grep -q 'seminstruct_request_duration_seconds' || exit 1

      - name: Test chat completions endpoint (integration)
        run: |
          echo "Testing chat completions endpoint..."
          # Get available models from semserve. llama-server is launched with
          # --alias qwen3-0.6b so that id should always be present.
          models=$(curl -s http://localhost:8083/v1/models)
          echo "Available models: $models"
          model_id=$(echo "$models" | jq -r '.data[] | select(.id | contains("qwen")) | .id' | head -1)
          if [ -z "$model_id" ]; then
            model_id=$(echo "$models" | jq -r '.data[-1].id // empty')
          fi
          echo "Selected model: $model_id"
          response=$(curl -s http://localhost:8083/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$model_id\",\"messages\":[{\"role\":\"user\",\"content\":\"Say hello\"}],\"max_tokens\":20,\"stream\":false}")
          echo "Response: $response"
          echo "$response" | jq -e '.choices[0].message.content' || (echo "No content in response" && exit 1)
          echo "Integration test passed!"

      - name: View semserve logs
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs semserve

      - name: View seminstruct logs
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs seminstruct

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009  # Ignore apt-get version pinning warnings

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build, security, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main-{{sha}},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-semserve:
    name: Push Semserve to GHCR (${{ matrix.variant.alias }})
    runs-on: ubuntu-latest
    needs: [build, security, lint]
    # Run on every main push and on manual dispatch. Previously this gated
    # on `head_commit.modified` containing Dockerfile.semserve, but that
    # checks only the *latest* commit in a multi-commit push — a trailing
    # CI-fix commit on top of a Dockerfile change would skip the matrix.
    # BuildKit GHA cache keeps unchanged-input rebuilds fast (~1-2 min per
    # variant from cache), so always-run is a cleaner contract than fragile
    # change-detection on the head commit.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          # Hot tier: small + fast for intent / classification / defaults.model.
          # reasoning=off so Qwen3 doesn't burn tokens on chain-of-thought
          # prefix before the actual classification token. Aliased as :latest
          # since single-endpoint deployments most often want the hot path.
          - alias: qwen3-0.6b
            repo: unsloth/Qwen3-0.6B-GGUF
            file: Qwen3-0.6B-Q4_K_M.gguf
            reasoning: off
            extra_tags: |
              type=raw,value=latest,enable={{is_default_branch}}
          # Quality tier: 1.7B for community_summary / answer_synthesis.
          # reasoning=auto lets Qwen3 think on harder summary tasks; this is
          # background batch so the latency cost is acceptable.
          - alias: qwen3-1.7b
            repo: unsloth/Qwen3-1.7B-GGUF
            file: Qwen3-1.7B-Q4_K_M.gguf
            reasoning: auto
            extra_tags: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/c360studio/semserve
          tags: |
            type=raw,value=${{ matrix.variant.alias }},enable={{is_default_branch}}
            type=raw,value=${{ matrix.variant.alias }}-{{sha}},enable={{is_default_branch}}
            ${{ matrix.variant.extra_tags }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.semserve
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODEL_REPO=${{ matrix.variant.repo }}
            MODEL_FILE=${{ matrix.variant.file }}
            SEMSERVE_ALIAS=${{ matrix.variant.alias }}
            SEMSERVE_REASONING=${{ matrix.variant.reasoning }}
          # Share the llama.cpp builder stage cache across matrix entries
          # (scope=builder). Each variant has its own model+runtime cache
          # (scope=variant-${alias}) since those layers differ.
          cache-from: |
            type=gha,scope=semserve-builder
            type=gha,scope=semserve-${{ matrix.variant.alias }}
          cache-to: |
            type=gha,scope=semserve-builder,mode=max
            type=gha,scope=semserve-${{ matrix.variant.alias }},mode=max
