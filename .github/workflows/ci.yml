name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Allow time for llama-server build + model download

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build seminstruct (llama-server + GGUF) from source
        run: |
          echo "Building seminstruct image with default Qwen3-0.6B Q4_K_M..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build

      - name: Start service
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for model load
        run: |
          echo "Waiting for llama-server to load the GGUF and start serving..."
          for i in {1..90}; do
            if curl -sf http://localhost:8083/health 2>/dev/null; then
              echo "seminstruct is healthy"
              exit 0
            fi
            echo "Attempt $i/90: model still loading..."
            sleep 5
          done
          echo "seminstruct failed to start"
          docker compose logs seminstruct
          exit 1

      - name: Verify model alias is published
        run: |
          models=$(curl -s http://localhost:8083/v1/models)
          echo "Models response: $models"
          echo "$models" | jq -e '.data[] | select(.id == "qwen3-0.6b")' > /dev/null \
            || (echo "Expected model id 'qwen3-0.6b' not found in /v1/models" && exit 1)

      - name: Test chat completions endpoint (integration)
        run: |
          response=$(curl -s -X POST http://localhost:8083/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"qwen3-0.6b","messages":[{"role":"user","content":"Say hello"}],"max_tokens":20,"stream":false}')
          echo "Response: $response"
          echo "$response" | jq -e '.choices[0].message.content' > /dev/null \
            || (echo "No content in response" && exit 1)
          echo "Integration test passed."

      - name: View seminstruct logs
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs seminstruct

      - name: Stop service
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009  # apt-get version pinning warnings

  push:
    name: Push to GHCR (${{ matrix.variant.alias }})
    runs-on: ubuntu-latest
    needs: [build, security, lint]
    # Run on every main push and on manual dispatch. BuildKit GHA cache
    # keeps unchanged-input rebuilds fast (~1-2 min per variant from
    # cache), so always-run is a cleaner contract than fragile
    # change-detection on the head commit.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          # Hot tier: small + fast for intent / classification / defaults.model.
          # reasoning=off so Qwen3 doesn't burn tokens on chain-of-thought
          # prefix before the actual classification token. Aliased as :latest
          # since single-endpoint deployments most often want the hot path.
          - alias: qwen3-0.6b
            repo: unsloth/Qwen3-0.6B-GGUF
            file: Qwen3-0.6B-Q4_K_M.gguf
            reasoning: off
            extra_tags: |
              type=raw,value=latest,enable={{is_default_branch}}
          # Quality tier: 1.7B for community_summary / answer_synthesis.
          # reasoning=auto lets Qwen3 think on harder summary tasks; this is
          # background batch so the latency cost is acceptable.
          - alias: qwen3-1.7b
            repo: unsloth/Qwen3-1.7B-GGUF
            file: Qwen3-1.7B-Q4_K_M.gguf
            reasoning: auto
            extra_tags: ""
          # Premium tier: 8B for deployments with the memory budget who want
          # higher answer/summary quality. ~5GB image, ~6GB process memory at
          # -np 4 -cb -c 2048. reasoning=auto.
          - alias: qwen3-8b
            repo: unsloth/Qwen3-8B-GGUF
            file: Qwen3-8B-Q4_K_M.gguf
            reasoning: auto
            extra_tags: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/c360studio/seminstruct
          tags: |
            type=raw,value=${{ matrix.variant.alias }},enable={{is_default_branch}}
            type=raw,value=${{ matrix.variant.alias }}-{{sha}},enable={{is_default_branch}}
            ${{ matrix.variant.extra_tags }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODEL_REPO=${{ matrix.variant.repo }}
            MODEL_FILE=${{ matrix.variant.file }}
            MODEL_ALIAS=${{ matrix.variant.alias }}
            MODEL_REASONING=${{ matrix.variant.reasoning }}
          # Share the llama.cpp builder stage cache across matrix entries
          # (scope=builder). Each variant has its own model+runtime cache
          # (scope=variant-<alias>) since those layers differ.
          cache-from: |
            type=gha,scope=seminstruct-builder
            type=gha,scope=seminstruct-${{ matrix.variant.alias }}
          cache-to: |
            type=gha,scope=seminstruct-builder,mode=max
            type=gha,scope=seminstruct-${{ matrix.variant.alias }},mode=max
